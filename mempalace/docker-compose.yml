# Version 1.0
services:
  pgvector:
    image: ankane/pgvector:latest
    container_name: cognitive-vector-db
    restart: unless-stopped
    ports:
      - "5433:5432" # Offset from ActivePieces default Postgres port
    environment:
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: sovereign_memory
      POSTGRES_DB: agentic_state
    volumes:
      - vector_storage:/var/lib/postgresql/data

volumes:
  vector_storage:
    driver: local